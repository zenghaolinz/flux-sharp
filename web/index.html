<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flux Sharp</title>
    <link rel="stylesheet" href="/web/style.css" />
    <script type="importmap">
    {
      "imports": {
        "three": "/web/vendor/three.module.js"
      }
    }
    </script>
  </head>
  <body>
    <!-- Full-screen preview area -->
    <div class="preview" id="preview">

      <!-- Frame: constrains 3D canvas & preview image to photo aspect ratio -->
      <div class="frame" id="frame">
        <!-- GaussianSplats3D mounts its canvas inside this container -->
        <div class="canvas-container" id="canvasContainer">
        </div>

        <!-- Preview image (overlays canvas for photo / repair result / compare) -->
        <img id="previewImg" class="preview-img" alt="preview" />
      </div>

      <!-- Upload prompt: centered "+" button -->
      <div class="upload-prompt" id="uploadPrompt">
        <label class="plus-btn" id="plusBtn">
          <input id="photoInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <span class="plus-icon"></span>
          <span class="plus-label">上传照片</span>
        </label>
        <p class="upload-hint">支持 JPG / PNG / WebP</p>
      </div>

      <!-- Top bar -->
      <div class="top-bar" id="topBar">
        <span class="brand-text">Flux Sharp</span>
        <div class="status-dots">
          <span class="status-pill"><span id="healthDot" class="status-dot" title="API"></span>API</span>
          <span class="status-pill"><span id="comfyuiDot" class="status-dot offline" title="ComfyUI"></span>ComfyUI</span>
        </div>
      </div>

      <!-- Mode indicator for compare -->
      <div class="mode-badge" id="modeBadge"></div>

      <!-- 3D view hint -->
      <div class="view-hint" id="viewHint">拖拽旋转 · 滚轮缩放 · 右键平移</div>

      <!-- Spinner overlay -->
      <div class="busy-overlay" id="busyOverlay">
        <div class="busy-card">
          <div class="busy-spinner"></div>
          <span id="busyText">生成中…</span>
        </div>
      </div>

      <!-- Bottom action bar -->
      <div class="action-bar" id="actionBar">
        <button id="generateBtn" class="btn btn-primary hidden" type="button" disabled>生成</button>
        <button id="repairBtn" class="btn btn-primary hidden" type="button">修复</button>
        <div class="post-group hidden" id="postGroup">
          <button id="compareBtn" class="btn btn-glass" type="button">对比</button>
          <button id="restoreBtn" class="btn btn-glass" type="button">恢复3D</button>
          <button id="exportBtn" class="btn btn-glass" type="button">导出</button>
        </div>
      </div>

      <!-- Error toast -->
      <div class="error-toast" id="errorToast"></div>
    </div>

    <script type="module" src="/web/app.js"></script>
  </body>
</html>
