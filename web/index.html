<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flux Sharp</title>
    <link rel="stylesheet" href="/web/style.css?v=2" />
    <script type="importmap">
    {
      "imports": {
        "three": "/web/vendor/three.module.js"
      }
    }
    </script>
  </head>
  <body>
    <div class="preview stage-home" id="preview">
      <div class="top-bar" id="topBar">
        <span class="brand-text"><span>Flux</span> <strong>Sharp</strong></span>
        <div class="status-dots">
          <span class="status-pill"><span id="healthDot" class="status-dot" title="API"></span>API</span>
          <span class="status-pill"><span id="comfyuiDot" class="status-dot offline" title="ComfyUI"></span>ComfyUI</span>
        </div>
      </div>

      <div class="frame" id="frame">
        <button class="preview-close hidden" id="previewCloseBtn" type="button" title="取消当前预览" aria-label="取消当前预览">×</button>
        <div class="canvas-container" id="canvasContainer"></div>
        <img id="previewImg" class="preview-img" alt="preview" />
      </div>

      <div class="upload-prompt" id="uploadPrompt">
        <label class="plus-btn" id="plusBtn">
          <input id="photoInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <span class="plus-icon"></span>
          <span class="plus-label">上传照片</span>
        </label>
        <p class="upload-hint">支持 JPG / PNG / WebP</p>
      </div>

      <div class="mode-badge" id="modeBadge"></div>
      <div class="view-hint" id="viewHint">拖拽旋转 · 滚轮缩放 · 右键平移</div>

      <div class="bottom-ui" id="bottomUi">
        <div class="dock" id="dock">
          <label class="dock-action upload-action" id="uploadAction" title="上传照片">
            <input id="dockPhotoInput" type="file" accept="image/png,image/jpeg,image/webp" />
            <span class="dock-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 15V4m0 0 4.2 4.2M12 4 7.8 8.2M5 15.5v2.2A2.3 2.3 0 0 0 7.3 20h9.4a2.3 2.3 0 0 0 2.3-2.3v-2.2"/></svg>
            </span>
            <span>上传</span>
          </label>
          <span class="dock-divider"></span>
          <button class="dock-action gallery-action" id="galleryBtn" type="button" title="图库">
            <span class="dock-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M5.5 5.5h13a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2Z"/><path d="m5 16 4.1-4.1a1.3 1.3 0 0 1 1.8 0L13 14l1.1-1.1a1.3 1.3 0 0 1 1.8 0L20 17"/><path d="M16.8 9.1h.01"/></svg>
            </span>
            <span>图库</span>
          </button>
        </div>

        <div class="post-group hidden" id="postGroup">
          <button id="compareBtn" class="btn btn-glass" type="button">对比</button>
          <button id="restoreBtn" class="btn btn-glass" type="button">恢复3D</button>
          <button id="exportBtn" class="btn btn-glass" type="button">导出</button>
        </div>

        <button id="generateBtn" class="primary-action hidden" type="button" disabled>
          <span class="sparkle">✦</span><span class="action-text">生成</span>
        </button>
        <button id="repairBtn" class="primary-action hidden" type="button">
          <span class="sparkle">✦</span><span class="action-text">重构</span>
        </button>
      </div>



      <div class="gallery-panel hidden" id="galleryPanel" aria-label="图库">
        <div class="gallery-panel-head">
          <span>图库</span>
          <button id="galleryCloseBtn" class="gallery-close" type="button">×</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <div class="error-toast" id="errorToast"></div>
    </div>

    <script type="module" src="/web/app.js?v=2"></script>
  </body>
</html>
